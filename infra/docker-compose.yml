version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: passport-bsides-db
    environment:
      POSTGRES_USER: passport
      POSTGRES_PASSWORD: passport123
      POSTGRES_DB: passport_bsides
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
