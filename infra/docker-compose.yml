services:
  postgres:
    image: postgres:15-alpine
    container_name: event-passport-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-passport}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-event_passport}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: